name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: i18n integrity check
        run: node scripts/check-i18n.mjs

      # TypeScript is validated by Vercel during `npm run build` (check-i18n + next build).
      # Running tsc --noEmit here fails because next-env.d.ts and .next/types are
      # gitignored and only generated by `next build` — which requires env vars.
